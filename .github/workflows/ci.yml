name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        julia-version:
          - '1.12'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Instantiate project
        shell: julia --color=yes --project=. {0}
        run: |
          using Pkg
          Pkg.instantiate()
          Pkg.precompile()

      - name: Run tests
        shell: julia --color=yes --project=. {0}
        run: |
          using Pkg
          Pkg.test()
